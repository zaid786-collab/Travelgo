<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torly-travel Agency</title>

    <link rel="shortcut icon" href="./favicon.svg" type="image/svg+xml">

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap"
    rel="stylesheet">
</head>
<body>

    <!-- HEADER -->

    <header class="header" data-header>

        <div class="overlay" data-overlay></div>

            <div class="header-top">
                <div class="container">
                    <a href="tel:+01123456790" class="helpline-box">

                        <div class="icon-box">
                            <ion-icon name="call-outline"></ion-icon>
                        </div>

                        <div class="wrapper">
                            <p class="helpline-title">For Further Inquires :</p>
                            <p class="helpline-numbers">+01 (123) 4567 90</p>

                            <a href="#" class="logo">
                                <img src="project-logo.png" alt="Tourly logo">
                            </a>

                            <div class="header-btn-group">

                                <button class="search-btn" ariel-label="Search">
                                    <ion-icon name="search"></ion-icon>
                                </button>

                                <button class="nav-open-btn" aria-label="Open Menu" data-nav-open-btn>
                                    <ion-icon name="menu-outline"></ion-icon>
                                </button>

                            </div>
                            
                        </div>
                    </a>
                </div>
            </div>

            <div class="header-bottom">

                <div class="container">
                    <ul class="social-list">
                        <li>
                            <a href="#" class="social-link"><ion-icon name="logo-facebook"></ion-icon></a>
                        </li>

                        <li>
                            <a href="#" class="social-link"><ion-icon name="logo-twitter"></ion-icon></a>
                        </li>

                        <li>
                            <a href="#" class="social-link"><ion-icon name="logo-youtube"></ion-icon></a>
                        </li>
                    </ul>

                    <nav class="navbar active" data-navbar>

                        <div class="navbar-top">

                            <a href="#" class="logo">
                                <img src="project-logo.png" alt="Tourly logo">
                            </a>

                            <button class="nav-close-btn" ariel-label="Close Menu" data-nav-close-btn><ion-icon name="close-outline"></ion-icon>
                            </button>

                        </div>

                        <ul class="navbar-list">

                            <li>
                                <a href="#home" class="navbar-link" data-nav-link>home</a>
                            </li>

                            <li>
                                <a href="#aboutus" class="navbar-link" data-nav-link>about us</a>
                            </li>

                            <li>
                                <a href="#destination" class="navbar-link" data-nav-link>destination</a>
                            </li>

                            <li>
                                <a href="#packages" class="navbar-link" data-nav-link>packages</a>
                            </li>

                            <li>
                                <a href="#gallery" class="navbar-link" data-nav-link>gallery</a>
                            </li>

                            <li>
                                <a href="#contact" class="navbar-link" data-nav-link>contact us</a>
                            </li>
                        </ul>

                        

                    </nav>

                    <button class="btn btn-primary">Book Now</button>

                </div>
            </div>
    </header>


    <script src="script.js"></script>

    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</body>
</html>
